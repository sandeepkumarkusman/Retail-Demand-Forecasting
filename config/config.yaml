# Retail Demand Forecasting Pipeline Configuration

active_solution: default_pipeline

solutions:
  default_pipeline:
    data_dir: data/raw
    processed_dir: data/processed
    submission_path: outputs/predictions.csv
    n_estimators: 100
    learning_rate: 0.05
    quantile_alphas: [0.05, 0.95]
    guard_thresholds:
      min_sales: 0
      max_sales: 1000
    cache_features: true
    random_seed: 42
